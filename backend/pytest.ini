[pytest]
asyncio_mode = auto
testpaths =
    tests/smoke
    tests/unit
    tests/integration
    tests/agent_evals
python_files = test_*.py *_test.py
markers =
    smoke: fast endpoint wiring checks
    unit: deterministic pure logic checks
    integration: API and persistence flows backed by the app stack
    agent_eval: deterministic agent behavior and workflow checks
