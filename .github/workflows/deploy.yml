name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # DEPLOY — runs only when CI passes on main
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            PROJECT_DIR="$HOME/the-turing-trials"

            [ -d "$PROJECT_DIR" ] || { echo "ERROR: project directory not found — clone it manually first."; exit 1; }
            [ -f "$PROJECT_DIR/.env" ] || { echo "ERROR: .env missing — cannot deploy without environment variables."; exit 1; }

            cd "$PROJECT_DIR"

            echo "── Pulling latest code ──────────────────────────"
            git fetch --all
            git reset --hard origin/main

            echo "── Building and starting containers ─────────────"
            docker compose up -d --build

            echo "── Waiting for services to initialise ───────────"
            sleep 15

            echo "── Container status ─────────────────────────────"
            docker compose ps

            echo "── Backend health check ─────────────────────────"
            curl -fsS http://localhost:8001/api/system-check \
              || { echo "Health check failed!"; docker compose logs --tail=50 backend; exit 1; }

            echo "── Pruning unused Docker images ─────────────────"
            docker image prune -f

            echo "── Deployment complete ✓ ────────────────────────"
