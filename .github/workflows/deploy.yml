name: Deploy The Turing Trials

on:
  push:
    branches:
      - main
      - 4-initizalize-monorepo-project-structure

      
jobs:
  deploy:
    name: Production Server Deploy
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Ubuntu & Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            PROJECT_DIR="$HOME/the-turing-trials"
            
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project not found. Please clone it manually first and create .env."
              exit 1
            fi
            
            echo "Pulling latest code..."
            cd $PROJECT_DIR
            git fetch --all
            git reset --hard origin/main
            
            if [ ! -f .env ]; then
              echo ".env file missing! Cannot deploy without environment variables."
              exit 1
            fi
            
            echo "Building and starting containers..."
            docker compose up -d --build
            
            echo "Waiting for services to start..."
            sleep 10
            
            echo "Container status:"
            docker compose ps
            
            echo "Checking backend health..."
            curl -fsS http://localhost:8001/ || (echo "Backend health check failed!" && exit 1)
            
            echo "Removing unused Docker resources..."
            docker image prune -f
            
            echo "Deployment complete."