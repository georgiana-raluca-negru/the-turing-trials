name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-progress run on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # BACKEND — lint & test
  # ───────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Lint — ruff
        run: ruff check . --output-format=github

      - name: Run tests
        run: |
          if find tests -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping."
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # FRONTEND — lint, type-check & build
  # ───────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint (Next.js)
        run: npx next lint

      - name: Type-check — TypeScript
        run: npx tsc --noEmit

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
